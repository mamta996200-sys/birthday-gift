<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-top: 50px;
    }

    p {
      font-size: 1.2rem;
      color: #fff;
      margin: 15px;
    }

    .btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ff6f91;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff6f91;
      color: #fff;
    }

    /* Confetti canvas */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎂 Happy Birthday! 🎉</h1>
  <p>Wishing you a day filled with love, joy, and happiness 💖</p>
  <p>May all your dreams come true ✨</p>

  <button class="btn" onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');

  let confetti = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function createConfetti() {
    for (let i = 0; i < 150; i++) {
      confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 10,
        color: `hsl(${Math.random() * 360}, 100%, 60%)`,
        tilt: Math.random() * 10 - 10
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach((c, i) => {
      ctx.beginPath();
      ctx.fillStyle = c.color;
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();

      c.y += Math.cos(c.d) + 2;
      c.x += Math.sin(c.d);

      if (c.y > canvas.height) {
        confetti[i].y = 0;
        confetti[i].x = Math.random() * canvas.width;
      }
    });

    requestAnimationFrame(drawConfetti);
  }

  function startConfetti() {
    confetti = [];
    createConfetti();
    drawConfetti();
  }

  // Auto start on load
  startConfetti();
</script>

</body>
</html>
